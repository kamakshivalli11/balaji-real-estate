kind = "web"
previewPath = "/"
title = "Balaji R – North Bangalore Real Estate"
version = "1.0.0"
id = "artifacts/balaji-realty"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24260

[services.development]
run = "pnpm --filter @workspace/balaji-realty run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/balaji-realty", "run", "build" ]
publicDir = "artifacts/balaji-realty/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24260"
BASE_PATH = "/"
